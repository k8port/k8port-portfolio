name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Enable Corepack + activate pnpm
              run: |
                  corepack enable
                  corepack prepare pnpm@10.10.0 --activate

            - name: Verify pnpm
              run: pnpm --version

            - name: Install dependencies
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: Run tests
              run: pnpm test:ci

# Deployment is handled by Vercel's native GitHub integration.
# Pushes to `main` deploy to Production automatically; pull requests
# get Preview deployments. No GitHub Pages deployment occurs here.
