name: Next.js Build and Deploy

on:
    push:
        branches: [mvp_layout_v1.1]
    pull_request:
        branches: [mvp_layout_v1.1]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Setup pnpm
              uses: pnpm/action-setup@v2
              with:
                  version: 8

            - name: Install dependencies
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: Run tests
              run: pnpm test

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: nextjs-build
                  path: .next/
